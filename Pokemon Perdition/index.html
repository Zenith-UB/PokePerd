	<head>

		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Pokepasta Perdition - V. 1.5.1</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #000000;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

		<div id="status">
			<img id="status-splash" class="show-image--false fullsize--false use-filter--false" src="Pokepasta Perdition - V. 1.5.1.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="Pokepasta Perdition - V. 1.5.1.js"></script>
		<script>
async function assembleFile(baseName, totalParts, mimeType, zeroPad) {
	const parts = [];
	for (let i = 1; i <= totalParts; i++) {
		const partNum = zeroPad ? String(i).padStart(2, '0') : String(i);
		const res = await fetch(`${baseName}.part${partNum}`);
		if (!res.ok) throw new Error(`Failed to fetch ${baseName}.part${partNum}`);
		parts.push(await res.arrayBuffer());
	}
	const totalSize = parts.reduce((sum, p) => sum + p.byteLength, 0);
	const combined = new Uint8Array(totalSize);
	let offset = 0;
	for (const part of parts) {
		combined.set(new Uint8Array(part), offset);
		offset += part.byteLength;
	}
	return new Blob([combined], { type: mimeType });
}

const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"Pokepasta Perdition - V. 1.5.1","experimentalVK":false,"fileSizes":{"Pokepasta Perdition - V. 1.5.1.pck":293635676,"Pokepasta Perdition - V. 1.5.1.wasm":35740641},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
const GODOT_THREADS_ENABLED = false;

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
		displayFailureNotice(missingMsg + missing.join('\n'));
	} else {
		setStatusMode('progress');

		// Register service worker to intercept .wasm fetch, then start game
		function startGame() {
			assembleFile('Pokepasta Perdition - V. 1.5.1.pck', 15, 'application/octet-stream', true).then((pckBlob) => {
				const pckURL = URL.createObjectURL(pckBlob);
				const engine = new Engine({
					...GODOT_CONFIG,
					mainPack: pckURL,
				});
				engine.startGame({
					'onProgress': function (current, total) {
						if (current > 0 && total > 0) {
							statusProgress.value = current;
							statusProgress.max = total;
						} else {
							statusProgress.removeAttribute('value');
							statusProgress.removeAttribute('max');
						}
					},
				}).then(() => {
					setStatusMode('hidden');
					URL.revokeObjectURL(pckURL);
				}, displayFailureNotice);
			}).catch(displayFailureNotice);
		}

		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('wasm-sw.js').then((reg) => {
				// If already controlled by our SW, go immediately
				if (navigator.serviceWorker.controller) {
					console.log('[SW] Already controlling, starting game');
					startGame();
					return;
				}
				// SW just installed for the first time — wait for it to claim the page
				// skipWaiting + clients.claim in the SW will fire controllerchange
				console.log('[SW] Waiting for controller...');
				navigator.serviceWorker.addEventListener('controllerchange', () => {
					console.log('[SW] Controller active, starting game');
					startGame();
				});
			}).catch((err) => {
				console.warn('[SW] Registration failed, starting anyway:', err);
				startGame();
			});
		} else {
			startGame();
		}
	}
}());
		</script>
	</body>
</html>
